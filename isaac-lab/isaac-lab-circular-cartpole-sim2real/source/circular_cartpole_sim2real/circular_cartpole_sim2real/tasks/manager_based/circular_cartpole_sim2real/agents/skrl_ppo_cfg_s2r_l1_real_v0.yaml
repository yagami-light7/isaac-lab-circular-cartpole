seed: 42

# =========================================================
# 1. Model Architecture
# =========================================================
models:
  separate: False

  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [256, 256, 128]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [256, 256, 128]
        activations: elu
    output: ONE

# =========================================================
# 2. Memory
# =========================================================
memory:
  class: RandomMemory
  memory_size: -1

# =========================================================
# 3. Agent Parameters
# =========================================================
agent:
  class: PPO

  rollouts: 96
  learning_epochs: 10
  mini_batches: 6

  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04

  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008

  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null

  random_timesteps: 0
  learning_starts: 0

  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True

  entropy_loss_scale: 0.02
  value_loss_scale: 2.0
  kl_threshold: 0.015
  rewards_shaper_scale: 0.1

  time_limit_bootstrap: False

  experiment:
    directory: "cartpole/l1_real_v0"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

# =========================================================
# 4. Trainer
# =========================================================
trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
